{% extends "base.html" %}
{% block title %}Register — Faves{% endblock %}

{% block content %}
<div class="card" style="max-width:420px; margin:2rem auto;">
  <h2>Create an account</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Register</button>
  </form>

  <p style="margin-top:1rem; text-align:center; font-size:.9rem;">
    Already have an account? <a href="{% url 'login' %}">Login</a>
  </p>
</div>
{% endblock %}
