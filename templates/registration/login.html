{% extends "base.html" %}
{% block title %}Login — Faves{% endblock %}

{% block content %}
<div class="card" style="max-width:420px; margin:2rem auto;">
  <h2>Login</h2>

  {% if form.errors %}
    <p style="color:#c00; margin-top:.5rem;">Invalid username or password.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Login</button>
  </form>

  <p style="margin-top:1rem; text-align:center; font-size:.9rem;">
    Don't have an account? <a href="{% url 'register' %}">Register</a>
  </p>
</div>
{% endblock %}
