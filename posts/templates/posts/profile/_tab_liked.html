<section class="profile-tab-panel" id="liked" data-profile-panel="liked" aria-label="Liked posts">
  <div class="mini-grid">
  {% for post in liked_posts %}
    {% include "posts/profile/_mini_post_card.html" with post=post %}
  {% empty %}
    <div class="card" style="text-align:center;">No liked posts yet.</div>
  {% endfor %}
  </div>
</section>
