<section class="profile-tab-panel active" id="profile-posts" data-profile-panel="posts" aria-label="Posts">
  <div class="mini-grid">
  {% for post in user_posts %}
    {% include "posts/profile/_mini_post_card.html" with post=post %}

  {% endfor %}
  </div>
</section>
