<div class="rating-modal-backdrop" id="ratingModal" aria-hidden="true">
  <div class="rating-modal" role="dialog" aria-modal="true" aria-labelledby="rating-modal-title">
    <h3 id="rating-modal-title">Rate this post</h3>
    <p>Choose a score from 1 to 10.</p>
    <div class="rating-grid">
      <button type="button" class="rating-choice" data-value="1">1</button>
      <button type="button" class="rating-choice" data-value="2">2</button>
      <button type="button" class="rating-choice" data-value="3">3</button>
      <button type="button" class="rating-choice" data-value="4">4</button>
      <button type="button" class="rating-choice" data-value="5">5</button>
      <button type="button" class="rating-choice" data-value="6">6</button>
      <button type="button" class="rating-choice" data-value="7">7</button>
      <button type="button" class="rating-choice" data-value="8">8</button>
      <button type="button" class="rating-choice" data-value="9">9</button>
      <button type="button" class="rating-choice" data-value="10">10</button>
    </div>
    <div class="rating-modal-actions">
      <button type="button" class="rating-cancel" id="ratingCancel">Cancel</button>
    </div>
  </div>
</div>
