<div class="file-upload-wrapper">
  <input type="file" name="images" id="id_images" multiple accept="image/*" />
  <div class="file-upload-content">
    <svg class="file-upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
      <circle cx="8.5" cy="8.5" r="1.5"></circle>
      <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
    <p class="file-upload-text" id="file-upload-text">Click or drag photos here</p>
    <p class="file-upload-hint">You can select multiple images</p>
  </div>
</div>
