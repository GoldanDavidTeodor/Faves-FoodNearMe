{% extends "base.html" %}
{% block title %}New Post — Faves{% endblock %}

{% block content %}
<div class="card" style="max-width:540px; margin:2rem auto;">
  <h2>New Post</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <p>
      <label for="id_images">Photos</label>
      <input type="file" name="images" id="id_images" multiple accept="image/*">
    </p>
    <button type="submit" class="btn btn-primary" style="margin-top:1rem; width:100%;">Post</button>
  </form>

  <p style="margin-top:1rem; text-align:center; font-size:.9rem;">
    <a href="{% url 'feed' %}">Back to feed</a>
  </p>
</div>
{% endblock %}
